nameOverride: svc-messaging

replicaCount: 1

deploymentStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 0
    maxUnavailable: 1

imagePullSecrets:
  - regcred

image:
  repository: registry.leultewolde.com/mereb/svc-messaging
  env:
    - name: NODE_ENV
      value: production
    - name: SERVICE_NAME
      value: svc-messaging
    - name: OTEL_EXPORTER_OTLP_ENDPOINT
      value: http://otel-collector-dev.platform-dev.svc.cluster.local:4318
    - name: OTEL_EXPORTER_OTLP_PROTOCOL
      value: http/protobuf
    - name: OTEL_EXPORTER_OTLP_TRACES_PROTOCOL
      value: http/protobuf
  envFrom:
    - configMapRef:
        name: svc-messaging-dev-config
    - secretRef:
        name: svc-messaging-dev-secrets
        optional: true

service:
  ports:
    - name: http
      port: 80
      targetPort: http
      containerPort: 4004

ingress:
  enabled: true
  className: kong
  annotations:
    kubernetes.io/ingress.class: kong
    cert-manager.io/cluster-issuer: letsencrypt-http
    konghq.com/strip-path: "true"
  hosts:
    - host: api-dev.mereb.app
      paths:
        - path: /messages
          pathType: Prefix
          servicePort: http
  tls:
    - secretName: messages-dev-tls
      hosts:
        - api-dev.mereb.app

configMap:
  enabled: true
  nameOverride: svc-messaging-dev-config
  data:
    PORT: "4004"
    MESSAGING_EVENTS_ENABLED: "true"
    KAFKA_BROKERS: platform-dev-redpanda-0.platform-dev-redpanda.platform-dev.svc.cluster.local:9092
    KAFKA_SSL: "true"
    KAFKA_SSL_INSECURE: "true"
    OIDC_ISSUER: https://auth.mereb.app/realms/mereb
    OIDC_AUDIENCE: account
    SPLUNK_HEC_URL: https://splunk-hec.mereb.app/services/collector/event
    SPLUNK_HEC_INDEX: logs-dev

resources:
  requests:
    cpu: 50m
    memory: 128Mi

autoscaling:
  enabled: false

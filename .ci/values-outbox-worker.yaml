replicaCount: 1

deploymentStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 0
    maxUnavailable: 1

podLabels:
  mereb.dev/workload-role: outbox-relay

image:
  args:
    - node
    - dist/outboxRelayWorker.js

service:
  enabled: false
  ports: []

ingress:
  enabled: false

autoscaling:
  enabled: false

serviceMonitor:
  enabled: false

vaultSecretsOperator:
  enabled: false

configMap:
  enabled: false

secret:
  enabled: false

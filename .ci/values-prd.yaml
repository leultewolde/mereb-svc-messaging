nameOverride: svc-messaging

replicaCount: 2

imagePullSecrets:
  - regcred

image:
  repository: registry.leultewolde.com/mereb/svc-messaging
  env:
    - name: NODE_ENV
      value: production
    - name: SERVICE_NAME
      value: svc-messaging
    - name: OTEL_EXPORTER_OTLP_ENDPOINT
      value: http://otel-collector.platform-prd.svc.cluster.local:4318
    - name: OTEL_EXPORTER_OTLP_PROTOCOL
      value: http/protobuf
    - name: OTEL_EXPORTER_OTLP_TRACES_PROTOCOL
      value: http/protobuf
  envFrom:
    - configMapRef:
        name: svc-messaging-config
    - secretRef:
        name: svc-messaging-secrets
        optional: true

service:
  ports:
    - name: http
      port: 80
      targetPort: http
      containerPort: 4004

ingress:
  enabled: true
  className: kong
  annotations:
    kubernetes.io/ingress.class: kong
    cert-manager.io/cluster-issuer: letsencrypt-http
    konghq.com/strip-path: "true"
  hosts:
    - host: api.mereb.app
      paths:
        - path: /messages
          pathType: Prefix
          servicePort: http
  tls:
    - secretName: messages-prd-tls
      hosts:
        - api.mereb.app

configMap:
  enabled: true
  nameOverride: svc-messaging-config
  data:
    PORT: "4004"
    MESSAGING_EVENTS_ENABLED: "true"
    KAFKA_BROKERS: platform-prd-redpanda-0.platform-prd-redpanda.platform-prd.svc.cluster.local:9092,platform-prd-redpanda-1.platform-prd-redpanda.platform-prd.svc.cluster.local:9092,platform-prd-redpanda-2.platform-prd-redpanda.platform-prd.svc.cluster.local:9092
    KAFKA_SSL: "true"
    KAFKA_SSL_INSECURE: "true"
    OIDC_ISSUER: https://auth.mereb.app/realms/mereb
    OIDC_AUDIENCE: account
    SPLUNK_HEC_URL: https://splunk-hec.mereb.app/services/collector/event
    SPLUNK_HEC_INDEX: logs-prd

resources:
  requests:
    cpu: 150m
    memory: 256Mi

autoscaling:
  enabled: false
